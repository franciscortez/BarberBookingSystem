<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Smooth drop shadow to give it that cartoon badge depth -->
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="0" flood-color="#0b111e" flood-opacity="0.3" />
    </filter>
    
    <!-- Clip path to keep the diagonal outer ring pattern perfectly circular -->
    <clipPath id="outer-ring-clip">
      <circle cx="256" cy="256" r="236" />
    </clipPath>
  </defs>

  <!-- MAIN BADGE CONTAINER (Transparent background globally, solid colors inside) -->
  <g filter="url(#badge-shadow)">
    <!-- Outer Deep Orange/Coral Ring Base -->
    <circle cx="256" cy="256" r="240" fill="#e76f51" stroke="#1d2433" stroke-width="12" />
    
    <!-- Diagonal Striped Pattern Layer inside the outer ring -->
    <g clip-path="url(#outer-ring-clip)">
      <g transform="rotate(45 256 256)" opacity="0.8">
        <line x1="-100" y1="-100" x2="700" y2="-100" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="-50" x2="700" y2="-50" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="0" x2="700" y2="0" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="50" x2="700" y2="50" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="100" x2="700" y2="100" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="150" x2="700" y2="150" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="200" x2="700" y2="200" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="250" x2="700" y2="250" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="300" x2="700" y2="300" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="350" x2="700" y2="350" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="400" x2="700" y2="400" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="450" x2="700" y2="450" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="500" x2="700" y2="500" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="550" x2="700" y2="550" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
        <line x1="-100" y1="600" x2="700" y2="600" stroke="#f4a261" stroke-width="24" stroke-dasharray="40 40" />
      </g>
    </g>

    <!-- Inner Deep Blue Core Disc -->
    <circle cx="256" cy="256" r="210" fill="#264653" stroke="#1d2433" stroke-width="12" />

    <!-- Pop-art Halftone Dotted Background Effect (gives it that comic/cartoon look) -->
    <mask id="dots-mask">
      <circle cx="256" cy="256" r="204" fill="white" />
    </mask>
    <g mask="url(#dots-mask)" opacity="0.12">
      <pattern id="dot-grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
        <circle cx="8" cy="8" r="3" fill="#ffffff" />
      </pattern>
      <rect x="40" y="40" width="432" height="432" fill="url(#dot-grid)" />
    </g>

    <!-- Circular Framing Lines inside the blue core -->
    <circle cx="256" cy="256" r="190" fill="none" stroke="#f4a261" stroke-width="4" opacity="0.4" />

    <!-- TEXT PATHS -->
    <!-- Top Text: GENTLEMEN'S QUARTERS -->
    <path id="text-path-top" d="M 76 256 A 180 180 0 1 1 436 256" fill="none" display="none" />
    <text font-family="'Montserrat', 'Arial Black', sans-serif" font-weight="900" font-size="34" fill="#e9c46a" letter-spacing="5">
      <textPath href="#text-path-top" startOffset="50%" text-anchor="middle">GENTLEMEN'S QUARTERS</textPath>
    </text>

    <!-- Bottom Text: THE ULTIMATE GROOMING EXPERIENCE -->
    <path id="text-path-bottom" d="M 436 256 A 180 180 0 1 1 76 256" fill="none" display="none" />
    <text font-family="'Montserrat', 'Arial', sans-serif" font-weight="800" font-size="20" fill="#ffffff" letter-spacing="4">
      <textPath href="#text-path-bottom" startOffset="50%" text-anchor="middle">THE ULTIMATE GROOMING EXPERIENCE</textPath>
    </text>

    <!-- ==================== CENTRAL TOOLS ==================== -->
    
    <!-- THE STRAIGHT RAZOR (Angled behind the scissors) -->
    <g transform="rotate(-28 256 260)">
      <!-- Razor Handle (Scale/Body) -->
      <path d="M120 230 C120 215, 360 225, 380 240 C395 252, 380 265, 360 265 L140 255 Z" fill="#d1d5db" stroke="#1d2433" stroke-width="12" stroke-linejoin="round" />
      <!-- Small handle details/pins -->
      <circle cx="140" cy="242" r="6" fill="#1d2433" />
      <circle cx="360" cy="250" r="6" fill="#1d2433" />
      
      <!-- Razor Blade (Extending outward) -->
      <path d="M150 236 L340 170 C350 165, 355 180, 350 190 L330 232 Z" fill="#e5e7eb" stroke="#1d2433" stroke-width="12" stroke-linejoin="round" />
      <!-- Hollow grind line on blade -->
      <path d="M175 224 L320 185" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" />
    </g>

    <!-- THE SCISSORS (Foreground element) -->
    <g>
      <!-- Pivot Screw -->
      <g id="scissors-pivot">
        <!-- Left Blade (Pointing up-right) -->
        <path d="M242 270 L345 120 C350 112, 362 118, 358 130 L275 292 Z" fill="#e5e7eb" stroke="#1d2433" stroke-width="12" stroke-linejoin="round" />
        <!-- Edge highlight line on left blade -->
        <path d="M260 250 L335 140" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.6" />

        <!-- Right Blade (Pointing up-left) -->
        <path d="M270 270 L167 120 C162 112, 150 118, 154 130 L237 292 Z" fill="#f3f4f6" stroke="#1d2433" stroke-width="12" stroke-linejoin="round" />
        
        <!-- Center Screw Pin -->
        <circle cx="256" cy="275" r="14" fill="#e9c46a" stroke="#1d2433" stroke-width="10" />
        <circle cx="256" cy="275" r="4" fill="#1d2433" />
      </g>

      <!-- Scissors Left Handle & Loops -->
      <g>
        <path d="M236 290 L195 350" stroke="#1d2433" stroke-width="14" stroke-linecap="round" />
        <!-- Large Finger Loop -->
        <circle cx="175" cy="385" r="38" fill="#e76f51" stroke="#1d2433" stroke-width="12" />
        <circle cx="175" cy="385" r="16" fill="#264653" stroke="#1d2433" stroke-width="10" />
        <!-- Finger Rest (Tang) -->
        <path d="M144 410 C130 418, 115 405, 112 390" fill="none" stroke="#1d2433" stroke-width="12" stroke-linecap="round" />
      </g>

      <!-- Scissors Right Handle & Loops -->
      <g>
        <path d="M276 290 L317 350" stroke="#1d2433" stroke-width="14" stroke-linecap="round" />
        <!-- Large Finger Loop -->
        <circle cx="337" cy="385" r="38" fill="#e76f51" stroke="#1d2433" stroke-width="12" />
        <circle cx="337" cy="385" r="16" fill="#264653" stroke="#1d2433" stroke-width="10" />
      </g>
    </g>

    <!-- Decorative Stars for the Premium Cartoon Aesthetic -->
    <path d="M 110 260 L 115 245 L 130 245 L 118 235 L 122 220 L 110 230 L 98 220 L 102 235 L 90 245 L 105 245 Z" fill="#e9c46a" stroke="#1d2433" stroke-width="4" stroke-linejoin="round" />
    <path d="M 402 260 L 407 245 L 422 245 L 410 235 L 414 220 L 402 230 L 390 220 L 394 235 L 382 245 L 397 245 Z" fill="#e9c46a" stroke="#1d2433" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>
